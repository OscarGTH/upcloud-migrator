name: Automated Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for conventional commits analysis
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-release
        run: cargo install cargo-release

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config --global url."https://github:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Check if release is needed (conventional commits)
        id: check-release
        run: |
          # Get the latest tag or use initial commit
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~1")
          
          # Check for conventional commits since last release
          COMMITS=$(git log ${LATEST_TAG}..HEAD --oneline --pretty=format:"%s" 2>/dev/null || git log HEAD~1..HEAD --oneline --pretty=format:"%s")
          
          # Check if any commit matches conventional commit patterns
          if echo "$COMMITS" | grep -qE '^(feat|fix|perf|refactor|docs|style|test|chore)(\(.+\))?!?:'; then
            echo "needs-release=true" >> "$GITHUB_OUTPUT"
            echo "Found conventional commits, proceeding with release"
          else
            echo "needs-release=false" >> "$GITHUB_OUTPUT"
            echo "No conventional commits found, skipping release"
          fi

      - name: Create release
        if: steps.check-release.outputs.needs-release == 'true'
        run: |
          # Use cargo-release to bump version and create tag
          cargo release --no-confirm
