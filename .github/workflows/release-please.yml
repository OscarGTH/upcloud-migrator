name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Step 1: create/update the release PR, or cut a release when merged ──
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Step 2: build release binaries for all targets in parallel ──
  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../upcloud-migrate-${{ needs.release-please.outputs.tag_name }}-${{ matrix.target }}.tar.gz upcloud-migrate

      - uses: actions/upload-artifact@v7
        with:
          name: upcloud-migrate-${{ matrix.target }}
          path: upcloud-migrate-${{ needs.release-please.outputs.tag_name }}-${{ matrix.target }}.tar.gz

  # ── Step 3: attach binaries to the GitHub release created by release-please ──
  publish:
    needs: [release-please, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload binaries to release
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
